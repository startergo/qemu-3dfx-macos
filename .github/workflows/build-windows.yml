          zstd
          ${{ env.mspkg }}-python
          ${{ env.mspkg }}-python-distlib
          ${{ env.mspkg }}-python-pip
          ${{ env.mspkg }}-python-setuptools
          ${{ env.mspkg }}-python-sphinx
          ${{ env.mspkg }}-python-sphinx_rtd_theme
          ${{ env.mspkg }}-angleproject
          ${{ env.mspkg }}-autotools
          ${{ env.mspkg }}-binutils
          ${{ env.mspkg }}-toolchain
          ${{ env.mspkg }}-tools
          ${{ env.mspkg }}-7zip
          ${{ env.mspkg }}-cairo
          ${{ env.mspkg }}-capstone
          ${{ env.mspkg }}-curl
          ${{ env.mspkg }}-cyrus-sasl
          ${{ env.mspkg }}-dtc
          ${{ env.mspkg }}-expat
          ${{ env.mspkg }}-fontconfig
          ${{ env.mspkg }}-freetype
          ${{ env.mspkg }}-gcc
          ${{ env.mspkg }}-gdk-pixbuf2
          ${{ env.mspkg }}-gettext-runtime
          ${{ env.mspkg }}-gettext-tools
          ${{ env.mspkg }}-glib2
          ${{ env.mspkg }}-gnutls
          ${{ env.mspkg }}-gst-libav
          ${{ env.mspkg }}-gst-plugins-ugly
          ${{ env.mspkg }}-gtk3
          ${{ env.mspkg }}-gtk-vnc
          ${{ env.mspkg }}-jack2
          ${{ env.mspkg }}-libcacard
          ${{ env.mspkg }}-libgcrypt
          ${{ env.mspkg }}-libepoxy
          ${{ env.mspkg }}-libnfs
          ${{ env.mspkg }}-libpng
          ${{ env.mspkg }}-libslirp
          ${{ env.mspkg }}-libssh
          ${{ env.mspkg }}-libssh2
          ${{ env.mspkg }}-libtasn1
          ${{ env.mspkg }}-libusb
          ${{ env.mspkg }}-libxml2
          ${{ env.mspkg }}-lz4
          ${{ env.mspkg }}-lzo2
          ${{ env.mspkg }}-meson
          ${{ env.mspkg }}-msitools
          ${{ env.mspkg }}-ncurses
          ${{ env.mspkg }}-nettle
          ${{ env.mspkg }}-ninja
          ${{ env.mspkg }}-pcre2
          ${{ env.mspkg }}-pixman
          ${{ env.mspkg }}-pkgconf
          ${{ env.mspkg }}-pulseaudio
          ${{ env.mspkg }}-SDL2
          ${{ env.mspkg }}-SDL2_image
          ${{ env.mspkg }}-SDL2_sound
          ${{ env.mspkg }}-snappy
          ${{ env.mspkg }}-spice
          ${{ env.mspkg }}-spice-gtk
          ${{ env.mspkg }}-spice-protocol
          ${{ env.mspkg }}-usbredir
          ${{ env.mspkg }}-xz
          ${{ env.mspkg }}-zlib
          ${{ env.mspkg }}-zstd

    - name: Fetching QEMU source
      continue-on-error: true
      shell: msys2 {0}
      run: |
        echo "Cloning QEMU source"
        git clone --depth 1 --branch "${{ env.qemu_ref }}" https://github.com/qemu/qemu.git "${{ env.qemu_src_dir }}"
        cd "${{ env.qemu_src_dir }}"
        echo "Fetched QEMU tag: $(git describe --tags)"

    - name: Patching build
      shell: msys2 {0}
      run: |
        echo "Applying qemu-3dfx patch stack"
        cd qemu-3dfx-arch
        PATCH_ARGS=(
          scripts/apply_qemu_patches.sh
          --src-dir "../${{ env.qemu_src_dir }}"
          --primary-patch "${{ env.primary_patch }}"
        )
        if [[ "${{ github.event.inputs.apply_experimental }}" == "true" ]]; then
          PATCH_ARGS+=(--with-qemu-exp)
          echo "Experimental patches ENABLED"
        else
          echo "Experimental patches DISABLED"
        fi
        bash "${PATCH_ARGS[@]}"

        # Re-sign with main repo commit from the QEMU source directory
        echo "Re-signing with main repo commit: ${{ env.COMMIT_SHORT }}"
        cd "../${{ env.qemu_src_dir }}"
        bash "../qemu-3dfx-arch/scripts/sign_commit" -git=".." "${{ env.COMMIT_SHORT }}"

    - name: Build local virglrenderer package
      shell: msys2 {0}
      run: |
        cd qemu-3dfx-arch/virgil3d/MINGW-packages
        dos2unix PKGBUILD 000*.patch
        makepkg-mingw -sCLfc --noconfirm
        pacman -U --noconfirm mingw-w64-*.pkg.tar.zst
        VIRGL_HDR="${MINGW_PREFIX}/include/virgl/virglrenderer.h"
        sed -i 's|^#define VIRGL_EXPORT.*$|#define VIRGL_EXPORT __declspec(dllimport)|' "${VIRGL_HDR}"
        grep -n '^#define VIRGL_EXPORT' "${VIRGL_HDR}"

    - name: Pre-install Python dependencies
      shell: msys2 {0}
      run: |
        python3 -m pip install pycotap sphinx sphinxcontrib-serializinghtml

    - name: Create build directory
      run: mkdir -p build

    - name: Configure build
      working-directory: ./build
      shell: msys2 {0}
      run: |
        echo "Configuring build"
        CFLAGS="${CFLAGS//-flto=auto/}"
        CXXFLAGS="${CXXFLAGS//-flto=auto/}"
        LDFLAGS="${LDFLAGS//-flto=auto/}"
        sed -i 's/-Wl,--high-entropy-va/-Wl,--disable-high-entropy-va/g' ../${{ env.qemu_src_dir }}/meson.build
