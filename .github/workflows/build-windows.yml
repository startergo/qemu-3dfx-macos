          --target-list="x86_64-softmmu,i386-softmmu" \
          --disable-guest-agent-msi \
          --disable-guest-agent \
          --disable-werror \
          --disable-stack-protector \
          --disable-rust \
          --enable-whpx \
          --enable-virglrenderer \
          --enable-opengl \
          --enable-gtk \
          --enable-debug \
          --enable-sdl \
          --enable-sdl-image \
          --enable-slirp \
          --enable-spice \
          --prefix=$(pwd)/../install_dir \
