name: Build QEMU-3dfx for Windows

# Matches upstream qemu-3dfx-arch/.github/workflows/build.yaml
# with submodule path adjustments (qemu-3dfx-arch/ prefix)
# Uses main repo (qemu-3dfx-macos) commit ID for all signing

permissions:
  contents: write
  packages: read

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish release assets
        required: false
        default: false
        type: boolean
      apply_experimental:
        description: Apply experimental patches (SDL Clipboard)
        required: false
        default: true
        type: boolean
      commit_id:
        description: Override commit ID for signing (leave empty for auto-detection)
        required: false
        default: ''
        type: string

jobs:
  MINGW64-Windows:
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      buildver: 'qemu-11.0.0'
      qemu_ref: 'v11.0.0'
      qemu_src_dir: 'qemu-11.0.0'
      primary_patch: '00-qemu110x-mesa-glide.patch'
      mspkg: 'mingw-w64-x86_64'
      branch: ${{ github.ref_name }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Initialize submodules
      shell: bash
      run: |
        git submodule update --init --recursive
        SUBMODULE_COMMIT=$(cd qemu-3dfx-arch && git rev-parse --short HEAD)
        echo "qemu-3dfx-arch submodule at: ${SUBMODULE_COMMIT}"

    - name: Set up commit ID
      shell: bash
      run: |
        if [ -n "${{ github.event.inputs.commit_id }}" ]; then
          COMMIT_SHORT="${{ github.event.inputs.commit_id }}"
          COMMIT_FULL="${{ github.event.inputs.commit_id }}"
        else
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_FULL=$(git rev-parse HEAD)
        fi
        echo "COMMIT_SHORT=${COMMIT_SHORT}" >> $GITHUB_ENV
        echo "COMMIT_FULL=${COMMIT_FULL}" >> $GITHUB_ENV
        echo "Main repo commit: ${COMMIT_SHORT}"

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          base
          base-devel
          dos2unix
          gcc
          git
          make
          ninja
          patch
          python
          rsync
          wget
          zstd
          ${{ env.mspkg }}-python
          ${{ env.mspkg }}-python-distlib
          ${{ env.mspkg }}-python-pip
          ${{ env.mspkg }}-python-setuptools
          ${{ env.mspkg }}-python-sphinx
          ${{ env.mspkg }}-python-sphinx_rtd_theme
          ${{ env.mspkg }}-angleproject
          ${{ env.mspkg }}-autotools
          ${{ env.mspkg }}-binutils
          ${{ env.mspkg }}-toolchain
          ${{ env.mspkg }}-tools
          ${{ env.mspkg }}-7zip
          ${{ env.mspkg }}-cairo
          ${{ env.mspkg }}-capstone
          ${{ env.mspkg }}-curl
          ${{ env.mspkg }}-cyrus-sasl
          ${{ env.mspkg }}-dtc
          ${{ env.mspkg }}-expat
          ${{ env.mspkg }}-fontconfig
          ${{ env.mspkg }}-freetype
          ${{ env.mspkg }}-gcc
          ${{ env.mspkg }}-gdk-pixbuf2
          ${{ env.mspkg }}-gettext-runtime
          ${{ env.mspkg }}-gettext-tools
          ${{ env.mspkg }}-glib2
          ${{ env.mspkg }}-gnutls
          ${{ env.mspkg }}-gst-libav
          ${{ env.mspkg }}-gst-plugins-ugly
          ${{ env.mspkg }}-gtk3
          ${{ env.mspkg }}-gtk-vnc
          ${{ env.mspkg }}-jack2
          ${{ env.mspkg }}-libcacard
          ${{ env.mspkg }}-libgcrypt
          ${{ env.mspkg }}-libepoxy
          ${{ env.mspkg }}-libnfs
          ${{ env.mspkg }}-libpng
          ${{ env.mspkg }}-libslirp
          ${{ env.mspkg }}-libssh
          ${{ env.mspkg }}-libssh2
          ${{ env.mspkg }}-libtasn1
          ${{ env.mspkg }}-libusb
          ${{ env.mspkg }}-libxml2
          ${{ env.mspkg }}-lz4
          ${{ env.mspkg }}-lzo2
          ${{ env.mspkg }}-meson
          ${{ env.mspkg }}-msitools
          ${{ env.mspkg }}-ncurses
          ${{ env.mspkg }}-nettle
          ${{ env.mspkg }}-ninja
          ${{ env.mspkg }}-pcre2
          ${{ env.mspkg }}-pixman
          ${{ env.mspkg }}-pkgconf
          ${{ env.mspkg }}-pulseaudio
          ${{ env.mspkg }}-SDL2
          ${{ env.mspkg }}-SDL2_image
          ${{ env.mspkg }}-SDL2_sound
          ${{ env.mspkg }}-snappy
          ${{ env.mspkg }}-spice
          ${{ env.mspkg }}-spice-gtk
          ${{ env.mspkg }}-spice-protocol
          ${{ env.mspkg }}-usbredir
          ${{ env.mspkg }}-xz
          ${{ env.mspkg }}-zlib
          ${{ env.mspkg }}-zstd

    - name: Fetching QEMU source
      continue-on-error: true
      shell: msys2 {0}
      run: |
        echo "Cloning QEMU source"
        git clone --depth 1 --branch "${{ env.qemu_ref }}" https://github.com/qemu/qemu.git "${{ env.qemu_src_dir }}"
        cd "${{ env.qemu_src_dir }}"
        echo "Fetched QEMU tag: $(git describe --tags)"

    - name: Patching build
      shell: msys2 {0}
      run: |
        echo "Applying qemu-3dfx patch stack"
        cd qemu-3dfx-arch
        PATCH_ARGS=(
          scripts/apply_qemu_patches.sh
          --src-dir "../${{ env.qemu_src_dir }}"
          --primary-patch "${{ env.primary_patch }}"
        )
        if [[ "${{ github.event.inputs.apply_experimental }}" == "true" ]]; then
          PATCH_ARGS+=(--with-qemu-exp)
          echo "Experimental patches ENABLED"
        else
          echo "Experimental patches DISABLED"
        fi
        bash "${PATCH_ARGS[@]}"

        # Re-sign with main repo commit from the QEMU source directory
        echo "Re-signing with main repo commit: ${{ env.COMMIT_SHORT }}"
        cd "../${{ env.qemu_src_dir }}"
        bash "../qemu-3dfx-arch/scripts/sign_commit" -git=".." "${{ env.COMMIT_SHORT }}"

    - name: Build local virglrenderer package
      shell: msys2 {0}
      run: |
        cd qemu-3dfx-arch/virgil3d/MINGW-packages
        dos2unix PKGBUILD 000*.patch
        makepkg-mingw -sCLfc --noconfirm
        pacman -U --noconfirm mingw-w64-*.pkg.tar.zst
        VIRGL_HDR="${MINGW_PREFIX}/include/virgl/virglrenderer.h"
        sed -i 's|^#define VIRGL_EXPORT.*$|#define VIRGL_EXPORT __declspec(dllimport)|' "${VIRGL_HDR}"
        grep -n '^#define VIRGL_EXPORT' "${VIRGL_HDR}"

    - name: Pre-install Python dependencies
      shell: msys2 {0}
      run: |
        python3 -m pip install pycotap sphinx sphinxcontrib-serializinghtml

    - name: Create build directory
      run: mkdir -p build

    - name: Configure build
      working-directory: ./build
      shell: msys2 {0}
      run: |
        echo "Configuring build"
        CFLAGS="${CFLAGS//-flto=auto/}"
        CXXFLAGS="${CXXFLAGS//-flto=auto/}"
        LDFLAGS="${LDFLAGS//-flto=auto/}"
        sed -i 's/-Wl,--high-entropy-va/-Wl,--disable-high-entropy-va/g' ../${{ env.qemu_src_dir }}/meson.build
        ../${{ env.qemu_src_dir }}/configure \
          --target-list="x86_64-softmmu,i386-softmmu" \
          --disable-guest-agent-msi \
          --disable-guest-agent \
          --disable-werror \
          --disable-stack-protector \
          --disable-rust \
          --enable-whpx \
          --enable-virglrenderer \
          --enable-opengl \
          --enable-gtk \
          --enable-debug \
          --enable-sdl \
          --enable-sdl-image \
          --enable-slirp \
          --enable-spice \
          --prefix=$(pwd)/../install_dir \
          --extra-cflags="-O2" \
          --extra-ldflags="-Wl,--disable-high-entropy-va -Wl,--disable-dynamicbase -Wl,--image-base,0x400000"

    - name: Compile build
      working-directory: ./build
      shell: msys2 {0}
      run: |
        echo "Compiling Build"
        ninja -j$(nproc)

    - name: Compile Host Openglide
      shell: msys2 {0}
      run: |
        cd qemu-3dfx-arch
        git submodule update --init --recursive
        cd wrappers/extra/openglide
        dos2unix configure.ac Makefile.am
        bash ./bootstrap
        mkdir ../build && cd ../build
        ../openglide/configure --disable-sdl && make
        mkdir -p ../../../install_dir
        cp -v .libs/libglide2x.dll ../../../install_dir/libglide2x.dll
        cp -v .libs/libglide3x.dll ../../../install_dir/libglide3x.dll

    - name: Installing build
      working-directory: ./build
      shell: msys2 {0}
      run: |
        echo "Installing build to output"
        make install
        cd ../install_dir
        bash ../qemu-3dfx-arch/scripts/dll_extract
        if [ -d ../build/bin ]; then
          mkdir -p bin
          cp -rv ../build/bin/* ./bin/
        else
          echo "No build/bin directory found; skipping bin staging"
        fi
        bash ../qemu-3dfx-arch/scripts/sign_binary
        cat <<EOF > version.txt
        QEMU-3dfx (Windows Build)
        =================================================
        GitHub Actions Artifact Build
        ${{ env.branch }} Branch
        Version ${{ env.buildver }}
        Built using ${MSYSTEM}
        Commit ${{ env.COMMIT_SHORT }}
        EOF
        unix2dos version.txt build-timestamp.txt
        echo "Finished build at $(date)"

    - name: Uploading build
      uses: actions/upload-artifact@v4
      with:
        name: bin-windows-mingw64-${{ env.buildver }}-artifact
        path: ./install_dir

  UCRT64-Windows:
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      buildver: 'qemu-11.0.0'
      qemu_ref: 'v11.0.0'
